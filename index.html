<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ROTA Fluxo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#2D1B69;--p2:#4527A0;--pf:#EDE7F6;
  --tl:#0F4C75;--tlf:#E3F2FD;
  --gr:#1A7A4A;--grf:#E8F5EE;
  --am:#B05D00;--amf:#FFF3E0;
  --rd:#C0392B;--rdf:#FDECEA;
  --bg:#F0F2F8;--sf:#FFF;--sf2:#F5F3FA;
  --bd:rgba(45,27,105,.09);--bd2:rgba(45,27,105,.16);
  --tx:#1A1040;--tx2:#4A4470;--tx3:#9090BB;
  --r:12px;--rs:8px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.app{max-width:900px;margin:0 auto;padding-bottom:72px}

/* NAV */
.hdr{background:var(--p);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:8px}
.logo-r{width:32px;height:32px;background:linear-gradient(135deg,#7B2F8A,#2D1B69);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;letter-spacing:-.5px}
.logo-txt{color:white;font-weight:800;font-size:15px}
.logo-sub{color:rgba(255,255,255,.45);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.hdr-right{color:rgba(255,255,255,.6);font-size:11px;font-weight:600}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:.5px solid var(--bd2);display:flex;z-index:50;max-width:900px;margin:0 auto}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;transition:all .15s;border:none;background:transparent;font-family:inherit;gap:3px}
.bnav-item.on .bnav-ico{color:var(--p)}
.bnav-item.on .bnav-lbl{color:var(--p);font-weight:700}
.bnav-ico{font-size:20px;color:var(--tx3)}
.bnav-lbl{font-size:10px;font-weight:500;color:var(--tx3)}
.badge-nav{position:absolute;top:4px;right:calc(50% - 16px);background:var(--rd);color:white;border-radius:99px;font-size:9px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}

/* CONTENT */
.ct{padding:16px 18px}
.row{display:flex;align-items:center;gap:8px}
.rwb{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.f1{flex:1;min-width:0}

/* CARDS */
.card{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--r);padding:14px 16px;margin-bottom:8px}
.card-sm{padding:10px 13px}

/* ALERT BANNER */
.alert-ban{background:var(--rdf);border:.5px solid rgba(192,57,43,.2);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.alert-ban-txt{font-size:12px;color:var(--rd);font-weight:600;flex:1}

/* STAGE TABS */
.stage-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.stage-tabs::-webkit-scrollbar{display:none}
.stab{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--bd2);background:var(--sf);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;font-size:12px;font-weight:600;color:var(--tx2)}
.stab.on{color:white;border-color:transparent}
.stab-count{background:rgba(255,255,255,.25);border-radius:99px;padding:1px 6px;font-size:10px;font-weight:700}
.stab:not(.on) .stab-count{background:var(--sf2);color:var(--tx3)}

/* CLIENT CARD */
.cli-card{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--rs);padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.cli-card:hover{border-color:var(--p);box-shadow:0 2px 8px rgba(45,27,105,.08)}
.cli-card.alerta{border-left:3px solid var(--rd)}
.cli-nome{font-size:13px;font-weight:700;color:var(--tx)}
.cli-tel{font-size:12px;color:var(--tx3);margin-top:1px}
.cli-meta{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
.dias-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.dias-ok{background:var(--grf);color:var(--gr)}
.dias-warn{background:var(--amf);color:var(--am)}
.dias-red{background:var(--rdf);color:var(--rd)}
.seg-tag{background:var(--pf);color:var(--p2);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.cli-actions{display:flex;gap:5px;margin-top:8px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--rs);border:.5px solid var(--bd2);background:var(--sf);font-size:12px;font-weight:600;cursor:pointer;color:var(--tx);font-family:inherit;transition:all .15s}
.btn:hover{background:var(--sf2)}
.btn-p{background:var(--p);color:white;border-color:var(--p)}.btn-p:hover{background:var(--p2)}
.btn-gr{background:var(--gr);color:white;border-color:var(--gr)}
.btn-rd{background:var(--rd);color:white;border-color:var(--rd)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-xs{padding:3px 7px;font-size:10px;font-weight:700}
.btn-ghost{border:none;background:transparent;padding:5px;cursor:pointer;font-family:inherit;color:var(--tx3);font-size:18px}
.btn-ghost:hover{color:var(--tx)}
.fab{position:fixed;bottom:72px;right:18px;width:52px;height:52px;border-radius:50%;background:var(--p);color:white;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(45,27,105,.3);display:flex;align-items:center;justify-content:center;z-index:40;transition:all .15s}
.fab:hover{background:var(--p2);transform:scale(1.05)}

/* FORM */
.fg{margin-bottom:12px}
.fl{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:4px}
input,textarea,select{width:100%;padding:9px 12px;border:.5px solid var(--bd2);border-radius:var(--rs);font-size:13px;font-family:inherit;color:var(--tx);background:var(--sf);outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--p)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(26,16,64,.4);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--sf);border-radius:20px 20px 0 0;padding:20px 18px 32px;width:100%;max-height:90vh;overflow-y:auto}
.modal-drag{width:40px;height:4px;background:var(--bd2);border-radius:99px;margin:0 auto 16px}
.mtt{font-size:16px;font-weight:800;color:var(--p);margin-bottom:16px}
@media(min-width:600px){
  .mbg{align-items:center}
  .modal{border-radius:16px;max-width:520px;padding:24px}
  .modal-drag{display:none}
}

/* DETAIL PANEL */
.detail-section{margin-bottom:16px}
.detail-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:6px}
.detail-val{font-size:13px;color:var(--tx);line-height:1.5}
.checklist-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:.3px solid var(--bd)}
.checklist-item:last-child{border-bottom:none}
.chk-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.chk-box.done{background:var(--gr);border-color:var(--gr)}
.chk-txt{font-size:12px;color:var(--tx2);flex:1;line-height:1.45}
.chk-txt.done{text-decoration:line-through;color:var(--tx3)}
.template-box{background:var(--pf);border:.5px solid rgba(45,27,105,.15);border-radius:var(--rs);padding:12px;font-size:12px;color:var(--p2);line-height:1.6;white-space:pre-wrap}
.hist-item{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:.3px solid var(--bd)}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;background:var(--p);flex-shrink:0;margin-top:4px}
.hist-txt{font-size:11px;color:var(--tx2);flex:1;line-height:1.4}
.hist-data{font-size:10px;color:var(--tx3);white-space:nowrap}
.etapa-select{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.etapa-chip{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;font-family:inherit}

/* LEADS */
.lead-card{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--rs);padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.lead-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--bd2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.lead-check.on{background:var(--p);border-color:var(--p)}
.lead-nome{font-size:12px;font-weight:700;color:var(--tx)}
.lead-info{font-size:11px;color:var(--tx3)}

/* SETUP */
.setup-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.setup-logo{width:64px;height:64px;background:linear-gradient(135deg,#7B2F8A,#2D1B69);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:white;margin:0 auto 16px}
.setup-tit{font-size:22px;font-weight:800;color:var(--p);text-align:center;margin-bottom:6px}
.setup-sub{font-size:13px;color:var(--tx3);text-align:center;margin-bottom:28px;line-height:1.5}
.setup-card{background:var(--sf);border-radius:var(--r);padding:20px;width:100%;max-width:440px;border:.5px solid var(--bd2)}
.etapa-conf{display:flex;align-items:center;gap:8px;padding:8px;border:.5px solid var(--bd2);border-radius:var(--rs);margin-bottom:6px}
.etapa-cor{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.etapa-conf-nome{flex:1;font-size:12px;font-weight:600;color:var(--tx)}
.etapa-dias{font-size:10px;color:var(--tx3)}

/* TEMPLATES */
.tpl-card{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--rs);overflow:hidden;margin-bottom:8px}
.tpl-hdr{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.tpl-cor{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tpl-nome{font-size:13px;font-weight:700;flex:1}
.tpl-body{padding:0 14px 14px}

/* SEARCH */
.search-box{display:flex;align-items:center;gap:8px;background:var(--sf);border:.5px solid var(--bd2);border-radius:99px;padding:7px 14px;margin-bottom:14px}
.search-box input{border:none;background:transparent;outline:none;font-size:13px;flex:1;padding:0}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.empty-ico{font-size:36px;margin-bottom:8px;opacity:.4}

/* SECTION TITLE */
.sec-tit{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:8px;margin-top:16px}
.sec-tit:first-child{margin-top:0}

.div{border:none;border-top:.5px solid var(--bd);margin:12px 0}
.info-tip{background:var(--pf);border-radius:var(--rs);padding:9px 12px;font-size:11px;color:var(--p2);line-height:1.5;margin-bottom:10px}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ── DEFAULTS ────────────────────────────────────────────────────
const COR_ETAPAS=['#2D3180','#7B2F8A','#9A6C00','#C0392B','#1A7A4A','#0F4C75','#6B4226'];

const DEFAULT_ETAPAS=[
  {id:1,nome:'Captação',cor:'#2D3180',dias:3,
   template:'Olá, [nome]! Tudo bem?\n\nVi que você pode se interessar por [produto]. Sou especialista em [segmento] e adoraria te ajudar a encontrar a melhor solução.\n\nPosso tirar algumas dúvidas rápidas?',
   checklist:['Registrar contato e origem do lead','Identificar necessidade principal','Verificar perfil e elegibilidade','Agendar próxima conversa']},
  {id:2,nome:'Qualificação',cor:'#7B2F8A',dias:2,
   template:'[nome], para te ajudar da melhor forma, preciso entender algumas informações.\n\nPoderia me responder rapidinho:\n\n1. Qual é a sua maior necessidade hoje?\n2. Você já tem algo parecido?\n3. Qual é o seu prazo para decidir?',
   checklist:['Coletar dados completos (nome, contato, perfil)','Identificar necessidade e urgência','Verificar poder de decisão','Registrar informações no sistema']},
  {id:3,nome:'Proposta',cor:'#9A6C00',dias:3,
   template:'[nome], preparei as melhores opções para o seu perfil!\n\nBaseado no que você me contou, selecionei [X] alternativas que atendem exatamente o que você precisa.\n\nPosso te apresentar os detalhes? Quando seria um bom momento?',
   checklist:['Preparar proposta personalizada','Apresentar opções e coberturas','Comparar vantagens e desvantagens','Registrar dúvidas e objeções']},
  {id:4,nome:'Follow-up',cor:'#C0392B',dias:2,
   template:'[nome], oi! 👋\n\nPassei para ver se você teve a oportunidade de analisar as opções que conversamos.\n\nTenho algumas novidades que podem te interessar. Posso te ligar em [data]?',
   checklist:['Verificar se analisou a proposta','Identificar e tratar objeções','Apresentar novas alternativas se necessário','Definir próximo passo com prazo']},
  {id:5,nome:'Fechamento',cor:'#1A7A4A',dias:2,
   template:'Ótimo, [nome]! Fico feliz com a sua decisão! 🎉\n\nVamos finalizar o processo. Preciso de algumas informações:\n\n[lista de documentos necessários]\n\nAssim que tiver tudo, dou sequência imediatamente!',
   checklist:['Confirmar decisão e escolha','Solicitar documentos necessários','Preencher proposta e formulários','Confirmar dados e assinar']},
  {id:6,nome:'Pós-venda',cor:'#0F4C75',dias:15,
   template:'[nome], oi! Como está sendo a experiência? 😊\n\nPassei para ver se está tudo certinho e se posso te ajudar com alguma coisa.\n\nLembre-se: estou à disposição para qualquer dúvida!',
   checklist:['Confirmar ativação/início','Apresentar benefícios e próximos passos','Pedir feedback e avaliação','Solicitar indicação de contatos']},
];

// ── STATE ────────────────────────────────────────────────────────
function gLS(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function sLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

const ROTA_CODE='vanessa2026'; // código da Vanessa
// Usuários com código próprio: adicione aqui novos usuários
var S={
  view:'pipeline',
  role:gLS('rota-role','login'), // 'login' | 'admin' | 'user'
  users:gLS('rota-users',[]),   // usuários cadastrados
  loginErr:'',
  currentUser:null,
  etapaAtiva:null,
  setupDone:gLS('rota-setup',false),
  config:gLS('rota-config',{negocio:'',segmento:''}),
  etapas:gLS('rota-etapas',DEFAULT_ETAPAS),
  clientes:gLS('rota-clientes',[]),
  leads:gLS('rota-leads',[]),
  modal:null,
  cliId:null,
  busca:'',
  leadsSel:[],
  nid:gLS('rota-nid',100),
  tplAberto:null,
  setupEtapa:0,
};

function save(){
  sLS('rota-setup',S.setupDone);
  sLS('rota-config',S.config);
  sLS('rota-etapas',S.etapas);
  sLS('rota-clientes',S.clientes);
  sLS('rota-leads',S.leads);
  sLS('rota-nid',S.nid);
  sLS('rota-users',S.users);
}

// ── LOGIN / LOGOUT ────────────────────────────────────────────
function bLoginRota(){
  const err=S.loginErr||'';
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)">
<div style="width:100%;max-width:340px">
  <div style="text-align:center;margin-bottom:32px">
    <div style="width:52px;height:52px;border-radius:14px;background:var(--p);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:white;margin:0 auto 12px">R</div>
    <div style="font-size:22px;font-weight:900;color:var(--tx);letter-spacing:-.5px">ROTA Fluxo</div>
    <div style="font-size:12px;color:var(--tx3);margin-top:4px">por Vanessa de Oliveira · Mãe CEO</div>
  </div>
  <div class="card" style="padding:24px">
    <div class="fg"><label class="fl">Código de acesso</label>
    <div style="position:relative">
      <input id="rf-code" type="password" placeholder="Digite seu código..." autocomplete="current-password"
        style="font-family:monospace;font-size:15px;text-align:center;letter-spacing:2px;width:100%;padding-right:40px"
        onkeydown="if(event.key==='Enter')doLoginRota()"/>
      <span onclick="var el=document.getElementById('rf-code');el.type=el.type==='password'?'text':'password';this.textContent=el.type==='password'?'👁':'🙈'"
        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;user-select:none">👁</span>
    </div></div>
    ${err?`<div style="font-size:12px;color:var(--rd);margin-bottom:10px;text-align:center">${err}</div>`:''}
    <button onclick="doLoginRota()" style="width:100%;margin-top:4px;padding:12px;background:var(--p);color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer">Entrar</button>
  </div>
  <div style="text-align:center;margin-top:20px;font-size:11px;color:var(--tx3)">Não tem código? Fale com a Vanessa.</div>
</div></div>`;
}

window.doLoginRota=function(){
  const code=(document.getElementById('rf-code')?.value||'').trim().toLowerCase();
  if(!code){S.loginErr='Digite o código de acesso';R();return;}
  if(code===ROTA_CODE){
    S.role='admin';S.loginErr='';
    sLS('rota-role','admin');R();return;
  }
  const usr=S.users.find(u=>u.code&&u.code.toLowerCase()===code);
  if(usr){
    S.role='user';S.loginErr='';
    // Carrega dados do usuário específico
    const uk='rota-data-'+usr.code;
    const ud=gLS(uk,null);
    if(ud){
      S.config=ud.config||{negocio:usr.nome,segmento:''};
      S.etapas=ud.etapas||gLS('rota-etapas',DEFAULT_ETAPAS);
      S.clientes=ud.clientes||[];
      S.leads=ud.leads||[];
      S.nid=ud.nid||100;
    } else {
      S.config={negocio:usr.nome||'',segmento:''};
      S.setupDone=false;
    }
    S.currentUser=usr;
    sLS('rota-role','user');
    sLS('rota-current-user',usr.code);
    R();return;
  }
  S.loginErr='Código inválido.';R();
};

window.adicionarUsuario=function(){
  const nome=(document.getElementById('nu-nome')?.value||'').trim();
  const code=(document.getElementById('nu-code')?.value||'').trim().toLowerCase();
  if(!nome||!code){alert('Preencha nome e código.');return;}
  if(code===S.config.code||code==='vanessa2026'){alert('Esse código já está em uso.');return;}
  if(S.users.find(u=>u.code===code)){alert('Já existe um usuário com esse código.');return;}
  S.users.push({nome,code});
  sLS('rota-users',S.users);
  R();
};

window.removerUsuario=function(idx){
  const u=S.users[idx];
  if(!u)return;
  if(!confirm('Remover '+u.nome+'? Os dados dele ficam salvos no dispositivo.'))return;
  S.users.splice(idx,1);
  sLS('rota-users',S.users);
  R();
};

window.doLogoutRota=function(){
  // Salva dados do usuário atual antes de sair
  if(S.role==='user'&&S.currentUser){
    const uk='rota-data-'+S.currentUser.code;
    sLS(uk,{config:S.config,etapas:S.etapas,clientes:S.clientes,leads:S.leads,nid:S.nid});
  } else if(S.role==='admin'){
    save();
  }
  S.role='login';S.loginErr='';S.currentUser=null;
  sLS('rota-role','login');
  sLS('rota-current-user',null);
  R();
};

// ── HELPERS ──────────────────────────────────────────────────────
function nid(){return ++S.nid;}
function hoje(){return new Date().toISOString();}
function fmt(d){if(!d)return'';return new Date(d).toLocaleDateString('pt-BR');}
function dias(d){if(!d)return 0;return Math.floor((Date.now()-new Date(d))/(864e5));}
function diaBadge(d,etapa){
  const n=dias(d);const lim=etapa?.dias||3;
  if(n>=lim*2)return`<span class="dias-badge dias-red">⚠ ${n}d</span>`;
  if(n>=lim)return`<span class="dias-badge dias-warn">⏰ ${n}d</span>`;
  return`<span class="dias-badge dias-ok">${n}d</span>`;
}
function emAlerta(cli){
  const et=S.etapas.find(e=>e.id===cli.etapa_id);
  return et&&dias(cli.data_ult_acao||cli.data_entrada)>=et.dias;
}
function cliAlertas(){return S.clientes.filter(c=>emAlerta(c));}
function renderTpl(tpl,cli){
  const et=S.etapas.find(e=>e.id===cli.etapa_id);
  return(tpl||'')
    .replace(/\[nome\]/g,cli.nome.split(' ')[0])
    .replace(/\[produto\]/g,S.config.segmento||'nosso produto')
    .replace(/\[segmento\]/g,S.config.segmento||'')
    .replace(/\[empresa\]/g,S.config.negocio||'')
    .replace(/\[data\]/g,new Date().toLocaleDateString('pt-BR'))
    .replace(/\[etapa\]/g,et?.nome||'');
}
function getCli(){return S.clientes.find(c=>c.id===S.cliId);}

// ── PIPELINE ─────────────────────────────────────────────────────
function bPipeline(){
  if(S.etapaAtiva===null) S.etapaAtiva=S.etapas[0]?.id||null;
  const alertas=cliAlertas();
  const etAtual=S.etapas.find(e=>e.id===S.etapaAtiva);
  const clisEtapa=S.clientes.filter(c=>c.etapa_id===S.etapaAtiva)
    .sort((a,b)=>(emAlerta(b)?1:0)-(emAlerta(a)?1:0));

  return`<div class="ct">
  ${alertas.length?`<div class="alert-ban">
    <span>⚠️</span>
    <span class="alert-ban-txt">${alertas.length} cliente${alertas.length>1?'s precisam':'precisa'} de follow-up urgente</span>
    <button class="btn btn-xs btn-rd" onclick="irAlertas()">Ver</button>
  </div>`:''}
  <div class="stage-tabs">
    ${S.etapas.map(e=>{
      const n=S.clientes.filter(c=>c.etapa_id===e.id).length;
      const al=S.clientes.filter(c=>c.etapa_id===e.id&&emAlerta(c)).length;
      return`<button class="stab ${S.etapaAtiva===e.id?'on':''}"
        style="${S.etapaAtiva===e.id?`background:${e.cor}`:'color:'+e.cor+';border-color:'+e.cor+'33'}"
        onclick="setAba(${e.id})">
        ${e.nome} <span class="stab-count">${n}${al?` ⚠${al}`:''}</span>
      </button>`;
    }).join('')}
  </div>
  ${etAtual?`<div style="font-size:11px;color:var(--tx3);margin-bottom:12px">
    Alerta de follow-up após <strong>${etAtual.dias} dias</strong> sem contato
  </div>`:''}
  ${clisEtapa.length===0?`<div class="empty"><div class="empty-ico">📭</div>Nenhum cliente nesta etapa</div>`:
    clisEtapa.map(c=>bCliCard(c)).join('')}
  </div>
  <button class="fab" onclick="abrirNovoCli()">+</button>`;
}

function bCliCard(c){
  const et=S.etapas.find(e=>e.id===c.etapa_id);
  const al=emAlerta(c);
  const d=dias(c.data_ult_acao||c.data_entrada);
  return`<div class="cli-card ${al?'alerta':''}" onclick="abrirCli(${c.id})">
  <div class="rwb">
    <div>
      <div class="cli-nome">${c.nome}</div>
      <div class="cli-tel">${c.tel||'—'}</div>
    </div>

  </div>
  <div class="cli-meta">
    ${c.segmento?`<span class="seg-tag">${c.segmento}</span>`:''}
    ${c.notas?`<span style="font-size:10px;color:var(--tx3)">📝 ${c.notas.slice(0,30)}${c.notas.length>30?'...':''}</span>`:''}
  </div>
  <div class="cli-actions" onclick="event.stopPropagation()">

    ${et&&S.etapas.indexOf(et)<S.etapas.length-1?`<button class="btn btn-sm btn-gr" onclick="avancarEtapa(${c.id})">→ Avançar</button>`:''}
  </div>
</div>`;

// ── CLIENTES ─────────────────────────────────────────────────────
function bClientes(){
  let lista=S.clientes;
  const busca=S.busca.toLowerCase();
  if(busca==='alerta') lista=lista.filter(c=>emAlerta(c));
  else if(busca) lista=lista.filter(c=>
    c.nome.toLowerCase().includes(busca)||
    (c.tel||'').includes(busca)||
    (c.segmento||'').toLowerCase().includes(busca));
  lista=[...lista].sort((a,b)=>(emAlerta(b)?1:0)-(emAlerta(a)?1:0));

  return`<div class="ct">
  <div class="search-box">
    <span>🔍</span>
    <input placeholder="Buscar por nome, telefone, segmento..." value="${S.busca==='alerta'?'':S.busca}"
      oninput="S.busca=this.value;R()"/>
    ${S.busca?`<button class="btn-ghost" style="font-size:16px" onclick="limparBusca()">✕</button>`:''}
  </div>
  <div style="font-size:12px;color:var(--tx3);margin-bottom:10px">${lista.length} cliente${lista.length!==1?'s':''}</div>
  ${lista.length===0?`<div class="empty"><div class="empty-ico">👥</div>${S.busca?'Nenhum resultado para "'+S.busca+'"':'Nenhum cliente ainda'}</div>`:
    lista.map(c=>{
      const et=S.etapas.find(e=>e.id===c.etapa_id);
      const al=emAlerta(c);
      return`<div class="card card-sm" onclick="abrirCli(${c.id})" style="cursor:pointer;${al?'border-left:3px solid var(--rd)':''}">
        <div class="rwb">
          <div>
            <div style="font-size:13px;font-weight:700">${c.nome}</div>
            <div style="font-size:11px;color:var(--tx3)">${c.tel||'—'}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">

            ${diaBadge(c.data_ult_acao||c.data_entrada,et)}
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>
  <button class="fab" onclick="abrirNovoCli()">+</button>`;
}

    <div class="detail-section">
      <div class="detail-lbl">Adicionar nota</div>
      <textarea id="nota-${c.id}" rows="2" placeholder="Anotação sobre este cliente...">${c.notas||''}</textarea>
      <button class="btn btn-p btn-sm" style="margin-top:6px" onclick="salvarNota(${c.id})">Salvar nota</button>
    </div>

    ${c.historico&&c.historico.length?`<div class="detail-section">
      <div class="detail-lbl">Histórico</div>
      ${c.historico.slice(-5).reverse().map(h=>`<div class="hist-item">
        <div class="hist-dot"></div>
        <div class="hist-txt">${h.txt}</div>
        <div class="hist-data">${fmt(h.data)}</div>
      </div>`).join('')}
    </div>`:''}

    <div style="display:flex;gap:8px;margin-top:8px">
      ${c.tel?`<a href="tel:${c.tel.replace(/\D/g,'')}" class="btn btn-p btn-sm">📞 Ligar</a>`:''}
      ${c.tel?`<a href="https://wa.me/55${c.tel.replace(/\D/g,'')}" target="_blank" class="btn btn-sm">💬 WhatsApp</a>`:''}
      <button class="btn btn-xs btn-rd" style="margin-left:auto" onclick="if(confirm('Excluir cliente?'))excluirCli(${c.id})">Excluir</button>
    </div>
  </div></div>`;
}

function bModalTemplate(){
  const c=getCli(); if(!c)return'';
  const et=S.etapas.find(e=>e.id===c.etapa_id);
  const tpl=renderTpl(et?.template||'',c);
  return`<div class="mbg" onclick="if(event.target.classList.contains('mbg'))fecharModal()">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="mtt">Template — ${et?.nome||''}</div>
    <div style="font-size:12px;color:var(--tx3);margin-bottom:10px">Para: <strong>${c.nome}</strong></div>
    <div class="template-box" id="tpl-preview">${tpl}</div>
    <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
      <button class="btn" onclick="fecharModal()">Fechar</button>
      <button class="btn btn-p" onclick="copiarTemplate(${c.id});fecharModal()">📋 Copiar mensagem</button>
    </div>
  </div></div>`;
}

// ── ACTIONS ──────────────────────────────────────────────────────
window.sv=v=>{S.view=v;S.busca='';R()};
window.fecharModal=()=>{S.modal=null;S.cliId=null;R()};
window.abrirNovoCli=()=>{S.modal='novo-cli';R()};
window.abrirCli=id=>{S.cliId=id;S.modal='detalhe';R()};
window.abrirTemplate=id=>{S.cliId=id;S.modal='template';R()};

window.finalizarSetup=()=>{
  const neg=document.getElementById('s-neg').value.trim();
  const seg=document.getElementById('s-seg').value.trim();
  if(!neg){alert('Informe o nome do negócio');return;}
  S.config={negocio:neg,segmento:seg};
  S.setupDone=true;
  save();R();
};

window.salvarNovoCli=()=>{
  const nome=document.getElementById('nc-nome').value.trim();
  if(!nome){alert('Nome obrigatório');return;}
  const cli={
    id:nid(),nome,
    tel:document.getElementById('nc-tel').value.trim(),
    segmento:document.getElementById('nc-seg').value.trim(),
    etapa_id:parseInt(document.getElementById('nc-etapa').value),
    notas:document.getElementById('nc-notas').value.trim(),
    data_entrada:hoje(),data_ult_acao:hoje(),
    historico:[{txt:'Cliente adicionado',data:hoje()}],
    checklist:null,
  };
  S.clientes.push(cli);
  S.modal=null;save();R();
};

window.moverEtapa=(cid,eid)=>{
  const et=S.etapas.find(e=>e.id===eid);
  S.clientes=S.clientes.map(c=>c.id!==cid?c:{...c,
    etapa_id:eid,
    data_ult_acao:hoje(),
    checklist:null,
    historico:[...(c.historico||[]),{txt:`Movido para "${et?.nome||''}"`,data:hoje()}],
  });
  save();S.modal='detalhe';R();
};

window.avancarEtapa=(cid)=>{
  const c=S.clientes.find(x=>x.id===cid);
  const idx=S.etapas.findIndex(e=>e.id===c.etapa_id);
  if(idx<S.etapas.length-1) moverEtapa(cid,S.etapas[idx+1].id);
};

window.toggleChk=(cid,i)=>{
  const et=S.etapas.find(e=>e.id===S.clientes.find(c=>c.id===cid)?.etapa_id);
  S.clientes=S.clientes.map(c=>{
    if(c.id!==cid)return c;
    const chk=c.checklist||(et?.checklist||[]).map(t=>({txt:t,done:false}));
    chk[i]={...chk[i],done:!chk[i].done};
    return{...c,checklist:chk,data_ult_acao:hoje()};
  });
  save();S.modal='detalhe';R();
};

window.salvarNota=(cid)=>{
  const nota=document.getElementById('nota-'+cid).value.trim();
  S.clientes=S.clientes.map(c=>c.id!==cid?c:{...c,
    notas:nota,data_ult_acao:hoje(),
    historico:[...(c.historico||[]),...(nota?[{txt:'Nota: '+nota.slice(0,60),data:hoje()}]:[])],
  });
  save();R();
};

window.copiarTemplate=(cid)=>{
  const c=S.clientes.find(x=>x.id===cid);
  const et=S.etapas.find(e=>e.id===c?.etapa_id);
  const tpl=renderTpl(et?.template||'',c||{nome:'',tel:''});
  navigator.clipboard?.writeText(tpl).then(()=>alert('Mensagem copiada! Cole no WhatsApp.'))
    .catch(()=>{
      const ta=document.createElement('textarea');
      ta.value=tpl;document.body.appendChild(ta);ta.select();
      document.execCommand('copy');document.body.removeChild(ta);
      alert('Mensagem copiada! Cole no WhatsApp.');
    });
};

window.excluirCli=(id)=>{
  S.clientes=S.clientes.filter(c=>c.id!==id);
  S.modal=null;save();R();
};

window.salvarTemplate=(eid)=>{
  const tpl=document.getElementById('tpl-'+eid)?.value||'';
  const chkRaw=document.getElementById('chk-'+eid)?.value||'';
  const dias=parseInt(document.getElementById('dias-'+eid)?.value)||3;
  const chk=chkRaw.split('\n').map(l=>l.trim()).filter(Boolean);
  S.etapas=S.etapas.map(e=>e.id!==eid?e:{...e,template:tpl,checklist:chk,dias});
  save();alert('Template salvo!');R();
};

window.salvarConfig=()=>{
  S.config={
    negocio:document.getElementById('cfg-neg').value.trim(),
    segmento:document.getElementById('cfg-seg').value.trim(),
  };
  save();alert('Configurações salvas!');R();
};

window.renomearEtapa=(id,nome)=>{
  S.etapas=S.etapas.map(e=>e.id!==id?e:{...e,nome});
  save();
};
window.alterarDiasEtapa=(id,dias)=>{
  S.etapas=S.etapas.map(e=>e.id!==id?e:{...e,dias:parseInt(dias)||3});
  save();
};
window.adicionarEtapa=()=>{
  const id=nid();
  S.etapas.push({id,nome:'Nova etapa',cor:COR_ETAPAS[S.etapas.length%COR_ETAPAS.length],dias:3,template:'',checklist:[]});
  save();R();
};
window.removerEtapa=(id)=>{
  if(!confirm('Remover esta etapa? Clientes nela serão movidos para a primeira etapa.'))return;
  S.clientes=S.clientes.map(c=>c.etapa_id===id?{...c,etapa_id:S.etapas[0]?.id}:c);
  S.etapas=S.etapas.filter(e=>e.id!==id);
  save();R();
};

window.parsarLeads=()=>{
  const txt=document.getElementById('leads-txt')?.value||'';
  if(!txt.trim()){alert('Cole a lista de leads primeiro.');return;}
  const linhas=txt.trim().split('\n').filter(l=>l.trim());
  const novos=linhas.map(l=>{
    const p=l.split(/[,;\t]/).map(x=>x.trim());
    const nome=p[0]||'';
    const tel=p.find(x=>/^\(?[\d\s\-\+\(\)]{8,}/.test(x)&&x!==nome)||'';
    const seg=p.find(x=>x&&x!==nome&&x!==tel)||'';
    return{id:nid(),nome,tel,segmento:seg,importado:false,data:hoje()};
  }).filter(l=>l.nome);
  S.leads=[...S.leads,...novos];
  S.leadsSel=[];
  document.getElementById('leads-txt').value='';
  save();R();
};

window.toggleLead=(id)=>{
  S.leadsSel=S.leadsSel.includes(id)?S.leadsSel.filter(x=>x!==id):[...S.leadsSel,id];
  R();
};
window.selecionarTodos=()=>{
  const pend=S.leads.filter(l=>!l.importado).map(l=>l.id);
  S.leadsSel=S.leadsSel.length===pend.length?[]:pend;
  R();
};
window.importarSelecionados=()=>{
  if(!S.leadsSel.length){alert('Selecione os leads a importar.');return;}
  const etapaId=parseInt(document.getElementById('leads-etapa')?.value)||S.etapas[0]?.id;
  const et=S.etapas.find(e=>e.id===etapaId);
  S.leadsSel.forEach(lid=>{
    const lead=S.leads.find(l=>l.id===lid);
    if(!lead)return;
    S.clientes.push({
      id:nid(),nome:lead.nome,tel:lead.tel,segmento:lead.segmento,
      etapa_id:etapaId,notas:'',data_entrada:hoje(),data_ult_acao:hoje(),
      historico:[{txt:`Importado como lead para "${et?.nome||''}"`,data:hoje()}],
      checklist:null,
    });
    S.leads=S.leads.map(l=>l.id===lid?{...l,importado:true}:l);
  });
  S.leadsSel=[];
  const qtd=S.leadsSel.length;S.leadsSel=[];save();alert(`${qtd} lead${qtd!==1?'s':''} importado${qtd!==1?'s':''}! Veja no Pipeline.`);R();
};
window.removerLead=(id)=>{S.leads=S.leads.filter(l=>l.id!==id);save();R()};

R();
</script>
</body>
</html>
